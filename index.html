<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Archive</title>

  <style>
    body {
      font-family: Arial;
      background: #0d1117;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .console {
      margin: 15px auto;
      max-width: 800px;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .console-header {
      padding: 15px;
      background: #161b22;
      cursor: pointer;
      font-size: 20px;
      text-align: center; /* CENTERED */
    }

    .console-header:hover {
      background: #21262d;
    }

    .games {
      display: none;
      padding: 10px;
      text-align: center;
    }

    .game-name {
      font-size: 1.15em;
      cursor: pointer;
      padding: 6px;
      transition: 0.2s;
    }

    .game-name:hover {
      color: #58a6ff;
    }

    .game-name.active {
      color: #58a6ff; /* BLUE highlight */
      font-weight: bold;
    }

    .image-container {
      display: none;
      margin: 10px 0;
    }

    .image-container img {
      width: 150px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .image-container.active img {
      transform: scale(1.3);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<h1>🎮 Retro Archive</h1>
<div id="content"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const content = document.getElementById('content');

    for (const console in data) {

      const consoleDiv = document.createElement('div');
      consoleDiv.className = 'console';

      const header = document.createElement('div');
      header.className = 'console-header';
      header.textContent = console;

      const gamesDiv = document.createElement('div');
      gamesDiv.className = 'games';

      data[console].forEach(game => {

        const name = document.createElement('div');
        name.className = 'game-name';
        name.textContent = game.name;

        const imageContainer = document.createElement('div');
        imageContainer.className = 'image-container';

        const img = document.createElement('img');
        img.src = game.image;

        imageContainer.appendChild(img);

        // CLICK GAME NAME
        name.addEventListener('click', () => {

          // reset all
          document.querySelectorAll('.image-container').forEach(el => {
            el.style.display = 'none';
            el.classList.remove('active');
          });

          document.querySelectorAll('.game-name').forEach(el => {
            el.classList.remove('active');
          });

          // activate this one
          imageContainer.style.display = 'block';
          imageContainer.classList.add('active');
          name.classList.add('active');
        });

        // LIGHTBOX CLICK
        img.addEventListener('click', () => {
          const lightbox = document.getElementById('lightbox');
          const lightboxImg = document.getElementById('lightbox-img');

          lightbox.style.display = 'flex';
          lightboxImg.src = img.src;
        });

        gamesDiv.appendChild(name);
        gamesDiv.appendChild(imageContainer);
      });

      // TOGGLE CONSOLE
      header.addEventListener('click', () => {
        gamesDiv.style.display =
          gamesDiv.style.display === 'block' ? 'none' : 'block';
      });

      consoleDiv.appendChild(header);
      consoleDiv.appendChild(gamesDiv);
      content.appendChild(consoleDiv);
    }
  });

// CLOSE LIGHTBOX
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').style.display = 'none';
});
</script>

</body>
</html>
