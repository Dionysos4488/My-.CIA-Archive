<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Archive</title>

  <style>
    body {
      font-family: Arial;
      background: #0d1117;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .console {
      margin: 15px auto;
      max-width: 800px;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .console-header {
      padding: 15px;
      background: #161b22;
      cursor: pointer;
      font-size: 18px;
    }

    .console-header:hover {
      background: #21262d;
    }

    .games {
      display: none;
      padding: 10px;
    }

    .game-name {
      font-size: 1.15em; /* 15% bigger */
      cursor: pointer;
      padding: 5px;
    }

    .game-name:hover {
      color: #58a6ff;
    }

    .image-container {
      display: none;
      margin: 10px 0;
      text-align: center;
    }

    .image-container img {
      width: 150px;
      border-radius: 8px;
      transition: transform 0.2s ease;
    }

    .image-container.active img {
      transform: scale(1.3); /* 30% bigger */
    }
  </style>
</head>
<body>

<h1>🎮 Retro Archive</h1>
<div id="content"></div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const content = document.getElementById('content');

    for (const console in data) {

      const consoleDiv = document.createElement('div');
      consoleDiv.className = 'console';

      const header = document.createElement('div');
      header.className = 'console-header';
      header.textContent = console;

      const gamesDiv = document.createElement('div');
      gamesDiv.className = 'games';

      data[console].forEach(game => {

        const name = document.createElement('div');
        name.className = 'game-name';
        name.textContent = game.name;

        const imageContainer = document.createElement('div');
        imageContainer.className = 'image-container';

        const img = document.createElement('img');
        img.src = game.image;

        imageContainer.appendChild(img);

        // CLICK GAME NAME
        name.addEventListener('click', () => {
          
          // close all others
          document.querySelectorAll('.image-container').forEach(el => {
            if (el !== imageContainer) {
              el.style.display = 'none';
              el.classList.remove('active');
            }
          });

          if (imageContainer.style.display === 'block') {
            imageContainer.style.display = 'none';
            imageContainer.classList.remove('active');
          } else {
            imageContainer.style.display = 'block';
            imageContainer.classList.add('active');
          }
        });

        gamesDiv.appendChild(name);
        gamesDiv.appendChild(imageContainer);
      });

      // TOGGLE CONSOLE
      header.addEventListener('click', () => {
        gamesDiv.style.display =
          gamesDiv.style.display === 'block' ? 'none' : 'block';
      });

      consoleDiv.appendChild(header);
      consoleDiv.appendChild(gamesDiv);
      content.appendChild(consoleDiv);
    }
  });
</script>

</body>
</html>
