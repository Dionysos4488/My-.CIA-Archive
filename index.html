<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Archive</title>

  <style>
    body {
      font-family: Arial;
      background: #0d1117;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .console {
      margin: 20px auto;
      max-width: 800px;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .console-header {
      padding: 15px;
      background: #161b22;
      cursor: pointer;
      font-size: 20px;
      text-align: center;
    }

    .console-header:hover {
      background: #21262d;
    }

    .games {
      display: none;
      padding: 15px;
      text-align: center;
    }

    .game-block {
      margin-bottom: 35px; /* more spacing between games */
    }

    .game-name {
      font-size: 1.15em;
      cursor: pointer;
      padding: 6px;
      transition: 0.2s;
    }

    .game-name:hover {
      color: #58a6ff;
    }

    .game-name.active {
      color: #58a6ff;
      font-weight: bold;
    }

    .image-container {
      display: none;
      margin-top: 15px;
      margin-bottom: 15px; /* prevents overlap below */
    }

    .image-container img {
      width: 150px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .image-container.active img {
      width: 195px; /* 30% bigger WITHOUT overlap */
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox-text {
      color: white;
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<h1>🎮</h1>
<div id="content"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-text">CLICK HERE TO CLOSE</div>
  <img id="lightbox-img">
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const content = document.getElementById('content');

    for (const console in data) {

      const consoleDiv = document.createElement('div');
      consoleDiv.className = 'console';

      const header = document.createElement('div');
      header.className = 'console-header';
      header.textContent = console;

      const gamesDiv = document.createElement('div');
      gamesDiv.className = 'games';

      data[console].forEach(game => {

        const block = document.createElement('div');
        block.className = 'game-block';

        const name = document.createElement('div');
        name.className = 'game-name';
        name.textContent = game.name;

        const imageContainer = document.createElement('div');
        imageContainer.className = 'image-container';

        const img = document.createElement('img');
        img.src = game.image;

        imageContainer.appendChild(img);

        name.addEventListener('click', () => {

          document.querySelectorAll('.image-container').forEach(el => {
            el.style.display = 'none';
            el.classList.remove('active');
          });

          document.querySelectorAll('.game-name').forEach(el => {
            el.classList.remove('active');
          });

          imageContainer.style.display = 'block';
          imageContainer.classList.add('active');
          name.classList.add('active');
        });

        img.addEventListener('click', () => {
          const lightbox = document.getElementById('lightbox');
          const lightboxImg = document.getElementById('lightbox-img');

          lightbox.style.display = 'flex';
          lightboxImg.src = img.src;
        });

        block.appendChild(name);
        block.appendChild(imageContainer);
        gamesDiv.appendChild(block);
      });

      header.addEventListener('click', () => {
        gamesDiv.style.display =
          gamesDiv.style.display === 'block' ? 'none' : 'block';
      });

      consoleDiv.appendChild(header);
      consoleDiv.appendChild(gamesDiv);
      content.appendChild(consoleDiv);
    }
  });

document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').style.display = 'none';
});
</script>

</body>
</html>
